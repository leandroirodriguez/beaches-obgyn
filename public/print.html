<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Print Schedule</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: -apple-system, Helvetica, sans-serif; }
    body { background: #fff; }
    @page { margin: 0.3in; size: landscape; }
    .page { width: 100%; min-height: 100vh; background: #fff; page-break-after: always; display: flex; flex-direction: column; padding: 10px 12px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; border-bottom: 2px solid #1a8c78; padding-bottom: 6px; }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo-text { font-weight: 900; font-size: 16px; color: #1a8c78; }
    .month-title { font-size: 20px; font-weight: 900; color: #1a3a35; }
    .month-sub { font-size: 9px; color: #888; text-align: right; }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 2px; }
    .weekday { text-align: center; padding: 2px 0; font-size: 9px; font-weight: 900; background: #f0faf8; border-radius: 3px; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; flex: 1; }
    .cell { border-radius: 4px; padding: 3px 4px; display: flex; flex-direction: column; overflow: hidden; min-height: 60px; }
    .cell-empty { background: #fafafa; border-radius: 4px; }
    .day-num { font-size: 11px; font-weight: 800; margin-bottom: 2px; }
    .avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; margin-bottom: 2px; display: block; }
    .avatar-initial { width: 22px; height: 22px; border-radius: 50%; margin-bottom: 2px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: #fff; }
    .prov-name { font-size: 8px; font-weight: 700; color: #333; line-height: 1.2; }
    .legend { margin-top: 6px; padding-top: 5px; border-top: 1px solid #e8e8e8; display: flex; flex-wrap: wrap; gap: 3px 12px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 8px; color: #555; font-weight: 600; }
    .legend-avatar { width: 12px; height: 12px; border-radius: 50%; object-fit: cover; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .preparing { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-size: 16px; color: #555; }
  </style>
</head>
<body>
  <div class="preparing" id="preparing">Preparing print…</div>
  <div id="content" style="display:none"></div>
  <script>
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    function getDays(y, m) { return new Date(y, m+1, 0).getDate(); }
    function getFirst(y, m) { return new Date(y, m, 1).getDay(); }

    function render() {
      let raw;
      try { raw = localStorage.getItem("printData"); } catch(e) {}
      if (!raw) { document.getElementById("preparing").textContent = "No print data found. Please go back and try again."; return; }

      let data;
      try { data = JSON.parse(raw); } catch(e) { document.getElementById("preparing").textContent = "Error reading print data."; return; }

      // Don't remove from localStorage — orientation change reloads this page and needs it
      const { months, providers, logoDataUrl } = data;
      const content = document.getElementById("content");
      content.innerHTML = "";

      months.forEach(({ year, month, scheduleData }) => {
        const days = getDays(year, month);
        const firstDay = getFirst(year, month);
        const cells = [];
        for (let i = 0; i < firstDay; i++) cells.push(null);
        for (let d = 1; d <= days; d++) cells.push(d);
        while (cells.length % 7 !== 0) cells.push(null);
        const numRows = Math.ceil(cells.length / 7);

        const page = document.createElement("div");
        page.className = "page";

        // Header
        const header = document.createElement("div");
        header.className = "header";
        const logoHtml = logoDataUrl
          ? `<img src="${logoDataUrl}" style="height:30px;object-fit:contain;"/>`
          : `<span class="logo-text">Beaches OBGYN</span>`;
        header.innerHTML = `<div class="header-left">${logoHtml}</div><div style="text-align:right"><div class="month-title">${MONTHS[month]} ${year}</div><div class="month-sub">Call Schedule</div></div>`;
        page.appendChild(header);

        // Weekday headers
        const wdRow = document.createElement("div");
        wdRow.className = "weekdays";
        ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach((d, i) => {
          const el = document.createElement("div");
          el.className = "weekday";
          el.style.color = (i===0||i===6) ? "#e05c5c" : "#1a8c78";
          el.textContent = d;
          wdRow.appendChild(el);
        });
        page.appendChild(wdRow);

        // Calendar grid
        const grid = document.createElement("div");
        grid.className = "calendar";
        grid.style.gridTemplateRows = `repeat(${numRows}, 1fr)`;

        cells.forEach((d, i) => {
          const cell = document.createElement("div");
          if (!d) { cell.className = "cell-empty"; grid.appendChild(cell); return; }

          const dateKey = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const prov = scheduleData?.[dateKey];
          const dow = (firstDay + d - 1) % 7;
          const isWeekend = dow === 0 || dow === 6;

          cell.className = "cell";
          cell.style.border = `1px solid ${prov ? prov.color+"55" : "#e8e8e8"}`;
          cell.style.borderTop = `3px solid ${prov ? prov.color : "#e8e8e8"}`;
          cell.style.background = isWeekend ? "#fdf8f8" : "#fff";

          const dayNum = document.createElement("div");
          dayNum.className = "day-num";
          dayNum.style.color = isWeekend ? "#e05c5c" : "#1a3a35";
          dayNum.textContent = d;
          cell.appendChild(dayNum);

          if (prov) {
            if (prov.avatar_url) {
              const img = document.createElement("img");
              img.className = "avatar";
              img.src = prov.avatar_url;
              img.style.border = `2px solid ${prov.color}`;
              img.onerror = () => {
                img.replaceWith(makeInitialDiv(prov));
              };
              cell.appendChild(img);
            } else {
              cell.appendChild(makeInitialDiv(prov));
            }
            const name = document.createElement("div");
            name.className = "prov-name";
            name.textContent = prov.name.replace("Dr. ", "");
            cell.appendChild(name);
          }

          grid.appendChild(cell);
        });
        page.appendChild(grid);

        // Legend
        const legend = document.createElement("div");
        legend.className = "legend";
        providers.forEach(p => {
          const item = document.createElement("div");
          item.className = "legend-item";
          if (p.avatar_url) {
            item.innerHTML = `<img class="legend-avatar" src="${p.avatar_url}" onerror="this.outerHTML='<div class=legend-dot style=background:${p.color}></div>'"/> ${p.name}`;
          } else {
            item.innerHTML = `<div class="legend-dot" style="background:${p.color}"></div> ${p.name}`;
          }
          legend.appendChild(item);
        });
        page.appendChild(legend);
        content.appendChild(page);
      });

      document.getElementById("preparing").style.display = "none";
      content.style.display = "block";

      // Wait for images to load, then print
      const images = content.querySelectorAll("img");
      let loaded = 0;
      const total = images.length;
      const tryPrint = () => {
        loaded++;
        if (loaded >= total) doPrint();
      };
      if (total === 0) {
        doPrint();
      } else {
        images.forEach(img => {
          if (img.complete) { tryPrint(); }
          else { img.onload = tryPrint; img.onerror = tryPrint; }
        });
      }
    }

    function makeInitialDiv(prov) {
      const div = document.createElement("div");
      div.className = "avatar-initial";
      div.style.background = prov.color;
      div.textContent = prov.initials;
      return div;
    }

    function doPrint() {
      setTimeout(() => {
        window.print();
        // Clean up localStorage after print dialog closes
        window.addEventListener("afterprint", () => {
          localStorage.removeItem("printData");
          window.location.href = "/";
        }, { once: true });
        // iOS fallback
        setTimeout(() => {
          localStorage.removeItem("printData");
          window.location.href = "/";
        }, 30000);
      }, 500);
    }

    render();
  </script>
</body>
</html>
